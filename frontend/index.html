<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clara</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* Avatar ocupa TODO el viewport */
    #avatar-iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
      z-index: 1;
    }

    /* Overlay de carga encima del iframe */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #05080f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      transition: opacity 0.8s ease;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid #1e293b;
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-text {
      color: #475569;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }

    /* Pill de estado encima del avatar */
    #status-pill {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0,0,0,0.55);
      color: #cbd5e1;
      padding: 7px 22px;
      border-radius: 999px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-pill.listening {
      color: #4ade80;
      border-color: rgba(74,222,128,0.3);
      background: rgba(0,0,0,0.7);
    }

    .wave-bars {
      display: none;
      align-items: center;
      gap: 3px;
      height: 16px;
    }
    .wave-bars.active { display: flex; }
    .wave-bars span {
      display: block; width: 3px;
      border-radius: 2px;
      background: #4ade80;
      animation: bar 0.7s ease-in-out infinite;
    }
    .wave-bars span:nth-child(1){ height:5px;  animation-delay:0s;   }
    .wave-bars span:nth-child(2){ height:12px; animation-delay:0.1s; }
    .wave-bars span:nth-child(3){ height:16px; animation-delay:0.2s; }
    .wave-bars span:nth-child(4){ height:12px; animation-delay:0.3s; }
    .wave-bars span:nth-child(5){ height:5px;  animation-delay:0.4s; }
    @keyframes bar {
      0%,100%{ transform:scaleY(0.4); opacity:0.5; }
      50%    { transform:scaleY(1);   opacity:1;   }
    }
  </style>
</head>
<body>

  <!-- Avatar fullscreen — carga inmediatamente -->
  <iframe
    id="avatar-iframe"
    allow="microphone; camera; autoplay"
    title="Clara"
    allowfullscreen
  ></iframe>

  <!-- Overlay de carga mientras el iframe no está listo -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Cargando a Clara...</div>
  </div>

  <!-- Pill de estado -->
  <div id="status-pill">
    <div class="wave-bars" id="wave-bars">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <span id="pill-text">Di "Oye Clara" para hablar</span>
  </div>

  <script>
    const BACKEND   = 'http://localhost:8090';
    const iframe    = document.getElementById('avatar-iframe');
    const loadingOv = document.getElementById('loading-overlay');
    const pill      = document.getElementById('status-pill');
    const pillText  = document.getElementById('pill-text');
    const waveBars  = document.getElementById('wave-bars');

    let isListening = false;
    let wakeRecog   = null;
    let cmdRecog    = null;
    let sessionId   = 'clara_' + Date.now();

    // ── 1. Cargar avatar al entrar ──────────────────────────
    async function initAvatar() {
      try {
        const res = await fetch(`${BACKEND}/embed`, {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ sandbox: false }),
        });
        const data = await res.json();
        if (!data.url) throw new Error('Sin URL');

        iframe.src = data.url;
        iframe.onload = () => {
          loadingOv.classList.add('hidden');
        };
        // Safety: ocultar overlay tras 8s aunque onload no dispare
        setTimeout(() => loadingOv.classList.add('hidden'), 8000);

      } catch(err) {
        document.getElementById('loading-text').textContent = 'Error conectando — recarga la página';
        console.error(err);
      }
    }

    // ── 2. Estado visual pill ───────────────────────────────
    function setIdle() {
      pill.classList.remove('listening');
      waveBars.classList.remove('active');
      pillText.textContent = 'Di "Oye Clara" para hablar';
    }

    function setListening() {
      pill.classList.add('listening');
      waveBars.classList.add('active');
      pillText.textContent = 'Escuchando...';
    }

    function setPillText(text, ms = 0) {
      pillText.textContent = text;
      if (ms) setTimeout(setIdle, ms);
    }

    // ── 3. Wake word continuo ───────────────────────────────
    function startWakeWord() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { setPillText('Usa Chrome para reconocimiento de voz'); return; }

      wakeRecog = new SR();
      wakeRecog.continuous     = true;
      wakeRecog.interimResults = true;
      wakeRecog.lang           = 'es-CO';

      wakeRecog.onresult = (e) => {
        const t = Array.from(e.results)
          .map(r => r[0].transcript).join(' ')
          .toLowerCase().trim();

        if (!isListening && (
          t.includes('oye clara') ||
          t.includes('oye, clara') ||
          t.includes('hey clara')
        )) onWakeWord();
      };

      wakeRecog.onend = () => {
        if (!isListening) setTimeout(() => { try { wakeRecog.start(); } catch(e){} }, 300);
      };

      wakeRecog.onerror = (e) => {
        if (e.error === 'not-allowed') setPillText('Permiso de micrófono denegado');
      };

      try { wakeRecog.start(); } catch(e) {}
    }

    // ── 4. Wake word detectado → escuchar comando ───────────
    async function onWakeWord() {
      if (isListening) return;
      isListening = true;
      try { wakeRecog.stop(); } catch(e) {}
      setListening();
      listenCommand();
    }

    function listenCommand() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      cmdRecog = new SR();
      cmdRecog.lang            = 'es-CO';
      cmdRecog.interimResults  = false;
      cmdRecog.maxAlternatives = 1;

      cmdRecog.onresult = (e) => {
        let text = e.results[0][0].transcript.trim();
        const raw = text.toLowerCase();

        // Despedida → nada (solo queda en pantalla, no cierra)
        if (/(adiós|adios|chao|hasta luego|hasta pronto|nos vemos)\s*(clara)?/i.test(raw)) {
          setPillText('¡Hasta luego! 👋', 3000);
          finishListening();
          return;
        }

        // Limpiar wake word si quedó
        text = text.replace(/^(oye|hey)[,.]?\s*clara[,.]?\s*/i, '').trim();

        if (text) {
          setPillText(`"${text}"`);
          sendToBackend(text);
        } else {
          finishListening();
        }
      };

      cmdRecog.onerror = () => finishListening();
      cmdRecog.onend   = () => { if (isListening) finishListening(); };

      try { cmdRecog.start(); } catch(e) { finishListening(); }
    }

    function finishListening() {
      isListening = false;
      setIdle();
      setTimeout(() => { try { wakeRecog.start(); } catch(e){} }, 500);
    }

    // ── 5. Enviar al backend ────────────────────────────────
    async function sendToBackend(message) {
      try {
        const res = await fetch(`${BACKEND}/chat`, {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ message, session_id: sessionId }),
        });
        const data = await res.json();
        const reply = data.reply || '';
        setPillText(reply.substring(0, 90) + (reply.length > 90 ? '…' : ''), 6000);
      } catch(err) {
        setPillText('Error de conexión', 3000);
        console.error(err);
      } finally {
        finishListening();
      }
    }

    // ── Init ────────────────────────────────────────────────
    initAvatar();
    startWakeWord();
  </script>
</body>
</html>
