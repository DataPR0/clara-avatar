<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clara</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; background: #000; overflow: hidden; }

    /* Video del avatar — fullscreen */
    #avatar-video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1;
      display: none;
    }

    /* Pantalla de carga */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #05080f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 20;
      font-family: 'Segoe UI', system-ui, sans-serif;
      transition: opacity 0.8s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #1e293b;
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-text { color: #475569; font-size: 0.9rem; letter-spacing: 0.1em; }

    /* Pill de estado */
    #pill {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      background: rgba(0,0,0,0.6);
      color: #94a3b8;
      padding: 8px 24px;
      border-radius: 999px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      white-space: nowrap;
    }
    #pill.listening  { color: #4ade80; border-color: rgba(74,222,128,0.3); }
    #pill.thinking   { color: #f59e0b; border-color: rgba(245,158,11,0.3); }
    #pill.speaking   { color: #0ea5e9; border-color: rgba(14,165,233,0.3); }
    #pill.error      { color: #ef4444; border-color: rgba(239,68,68,0.3); }

    .bars { display: none; align-items: center; gap: 3px; height: 14px; }
    .bars.on { display: flex; }
    .bars span { display:block; width:3px; border-radius:2px; background:currentColor; animation:bar 0.7s ease-in-out infinite; }
    .bars span:nth-child(1){height:4px;  animation-delay:0s}
    .bars span:nth-child(2){height:10px; animation-delay:.1s}
    .bars span:nth-child(3){height:14px; animation-delay:.2s}
    .bars span:nth-child(4){height:10px; animation-delay:.3s}
    .bars span:nth-child(5){height:4px;  animation-delay:.4s}
    @keyframes bar{0%,100%{transform:scaleY(.4);opacity:.5}50%{transform:scaleY(1);opacity:1}}

    /* Debug log */
    #log {
      position: fixed; top:10px; left:10px; z-index:40;
      background: rgba(0,0,0,0.7); color:#64748b;
      font: 11px/1.7 monospace;
      padding: 8px 12px; border-radius:8px;
      max-width: 320px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* Botón de reintento si falla */
    #retry-btn {
      display: none;
      margin-top: 16px;
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    #retry-btn:hover { background: #1e293b; color: #e2e8f0; }
  </style>
</head>
<body>

  <video id="avatar-video" autoplay playsinline muted></video>

  <div id="loading-screen">
    <div class="spinner"></div>
    <div id="loading-text">Conectando con Clara...</div>
    <button id="retry-btn" onclick="init()">Reintentar</button>
  </div>

  <div id="pill">
    <div class="bars" id="bars"><span></span><span></span><span></span><span></span><span></span></div>
    <span id="pill-text">Di "Oye Clara" para hablar</span>
  </div>

  <div id="log">Iniciando...</div>

  <!-- LiveKit SDK (UMD) -->
  <script src="node_modules/livekit-client/dist/livekit-client.umd.js"></script>
  <script>
    const BACKEND = 'http://localhost:8090';

    const videoEl   = document.getElementById('avatar-video');
    const loadingEl = document.getElementById('loading-screen');
    const loadText  = document.getElementById('loading-text');
    const retryBtn  = document.getElementById('retry-btn');
    const pill      = document.getElementById('pill');
    const pillText  = document.getElementById('pill-text');
    const bars      = document.getElementById('bars');
    const logEl     = document.getElementById('log');

    let room            = null;
    let liveAvatarSessionId = null;
    let backendSessionId    = 'clara_' + Date.now();
    let isListening         = false;
    let isSpeaking          = false;
    let wakeRecog           = null;
    let cmdRecog            = null;
    let keepAliveInterval   = null;

    // ── Log ──────────────────────────────────────────────────────────────────
    function log(msg) {
      const t = new Date().toLocaleTimeString('es-CO');
      logEl.innerHTML = `[${t}] ${msg}<br>` + logEl.innerHTML.split('<br>').slice(0, 8).join('<br>');
      console.log('[Clara]', msg);
    }

    // ── UI States ─────────────────────────────────────────────────────────────
    function setIdle(text = 'Di "Oye Clara" para hablar') {
      pill.className = '';
      bars.classList.remove('on');
      pillText.textContent = text;
    }
    function setListeningUI() {
      pill.className = 'listening';
      bars.classList.add('on');
      pillText.textContent = 'Escuchando...';
    }
    function setThinkingUI() {
      pill.className = 'thinking';
      bars.classList.remove('on');
      pillText.textContent = 'Clara está pensando...';
    }
    function setSpeakingUI() {
      pill.className = 'speaking';
      bars.classList.add('on');
      pillText.textContent = 'Clara está hablando...';
    }
    function setErrorUI(msg) {
      pill.className = 'error';
      bars.classList.remove('on');
      pillText.textContent = msg || 'Error';
    }

    // ── 1. Iniciar sesión LiveAvatar LITE Mode ────────────────────────────────
    async function startLiveAvatarSession() {
      log('Creando session token LITE...');
      loadText.textContent = 'Conectando con Clara...';
      retryBtn.style.display = 'none';

      // 1a. Token
      const tokenRes = await fetch(`${BACKEND}/session/token`, { method: 'POST' });
      if (!tokenRes.ok) {
        const err = await tokenRes.json();
        throw new Error(`Token error: ${err.detail || tokenRes.status}`);
      }
      const tokenData = await tokenRes.json();
      if (!tokenData.session_token) throw new Error('Sin session_token en respuesta');
      log('Token OK ✅');

      // 1b. Start session
      loadText.textContent = 'Iniciando sesión...';
      const startRes = await fetch(`${BACKEND}/session/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_token: tokenData.session_token }),
      });
      if (!startRes.ok) {
        const err = await startRes.json();
        throw new Error(`Start error: ${err.detail || startRes.status}`);
      }
      const startData = await startRes.json();
      log(`Sesión: ${startData.session_id?.slice(0, 8)}...`);

      if (!startData.livekit_url || !startData.livekit_client_token) {
        throw new Error(`Respuesta inesperada: ${JSON.stringify(startData)}`);
      }

      liveAvatarSessionId = startData.session_id;

      // 1c. Conectar LiveKit para recibir video del avatar
      loadText.textContent = 'Conectando video...';
      room = new LivekitClient.Room({
        adaptiveStream: true,
        dynacast: true,
      });

      room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
        log(`Track: ${track.kind}`);
        if (track.kind === LivekitClient.Track.Kind.Video) {
          track.attach(videoEl);
          videoEl.style.display = 'block';
          videoEl.muted = false;
          loadingEl.classList.add('hidden');
          log('✅ Avatar visible');
          setIdle();
        }
        if (track.kind === LivekitClient.Track.Kind.Audio) {
          track.attach();  // auto-play audio del avatar
          log('🔊 Audio del avatar conectado');
        }
      });

      room.on(LivekitClient.RoomEvent.Disconnected, () => {
        log('Desconectado de LiveKit');
        setErrorUI('Sesión terminada — recarga');
        stopKeepAlive();
      });

      await room.connect(startData.livekit_url, startData.livekit_client_token);
      log('LiveKit conectado ✅');

      // 1d. Keep-alive cada 60s para no perder la sesión por idle
      startKeepAlive();
    }

    // ── Keep-alive ────────────────────────────────────────────────────────────
    function startKeepAlive() {
      stopKeepAlive();
      keepAliveInterval = setInterval(async () => {
        try {
          await fetch(`${BACKEND}/session/keepalive`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: liveAvatarSessionId }),
          });
        } catch(e) {}
      }, 60000);
    }
    function stopKeepAlive() {
      if (keepAliveInterval) clearInterval(keepAliveInterval);
    }

    // ── 2. Wake word ──────────────────────────────────────────────────────────
    function startWakeWord() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        setErrorUI('Usa Chrome para voz');
        log('⚠️ Web Speech API no disponible');
        return;
      }

      wakeRecog = new SR();
      wakeRecog.continuous     = true;
      wakeRecog.interimResults = true;
      wakeRecog.lang           = 'es-CO';

      wakeRecog.onresult = (e) => {
        const t = Array.from(e.results).map(r => r[0].transcript).join(' ').toLowerCase().trim();
        if (!isListening && !isSpeaking &&
            (t.includes('oye clara') || t.includes('oye, clara') || t.includes('hey clara'))) {
          onWakeWord();
        }
      };
      wakeRecog.onend = () => {
        if (!isListening) setTimeout(() => { try { wakeRecog.start(); } catch(e){} }, 300);
      };
      wakeRecog.onerror = (e) => {
        if (e.error === 'not-allowed') {
          setErrorUI('Permiso de micrófono denegado');
          log('❌ Permiso de micrófono denegado');
        }
      };

      try {
        wakeRecog.start();
        log('🎤 Wake word activo');
      } catch(e) {
        log('Error mic: ' + e);
      }
    }

    // ── 3. Wake word detectado ────────────────────────────────────────────────
    async function onWakeWord() {
      if (isListening || isSpeaking) return;
      isListening = true;
      log('✨ "Oye Clara" detectado!');
      try { wakeRecog.stop(); } catch(e) {}
      setListeningUI();
      listenForCommand();
    }

    // ── 4. Escuchar comando del usuario ───────────────────────────────────────
    function listenForCommand() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      cmdRecog = new SR();
      cmdRecog.lang           = 'es-CO';
      cmdRecog.interimResults = false;
      cmdRecog.continuous     = false;

      cmdRecog.onresult = async (e) => {
        let transcript = e.results[0][0].transcript.trim();
        log(`Escuché: "${transcript}"`);

        // Quitar wake word del inicio si quedó en la transcripción
        transcript = transcript.replace(/^(oye|hey)[,\s]*clara[,.\s]*/i, '').trim();
        if (!transcript) {
          endListening();
          return;
        }

        // Despedida
        if (/(adiós|adios|chao|hasta luego|nos vemos)/i.test(transcript)) {
          log('Despedida detectada');
          endListening();
          return;
        }

        await processMessage(transcript);
      };

      cmdRecog.onerror = (e) => {
        log('STT error: ' + e.error);
        endListening();
      };
      cmdRecog.onend = () => {
        // Si no hubo resultado (silencio), volver a esperar wake word
        if (isListening && !isSpeaking) endListening();
      };

      try { cmdRecog.start(); } catch(e) { endListening(); }
    }

    // ── 5. Procesar mensaje → LLM → TTS → Avatar ─────────────────────────────
    async function processMessage(text) {
      isListening = false;
      isSpeaking  = true;
      setThinkingUI();
      log(`Enviando: "${text.slice(0, 40)}..."`);

      try {
        const res = await fetch(`${BACKEND}/chat/speak`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            session_id: liveAvatarSessionId,
            backend_session_id: backendSessionId,
          }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();
        log(`Clara respondió: "${data.reply?.slice(0, 50)}..."`);
        setSpeakingUI();

        // Esperar ~3s (estimado) y volver a idle
        // (Idealmente escuchar evento agent.speak_ended del backend)
        const duration = estimateSpeakDuration(data.reply);
        setTimeout(() => {
          isSpeaking = false;
          setIdle();
          // Reactivar wake word
          setTimeout(() => { try { wakeRecog.start(); } catch(e){} }, 300);
        }, duration);

      } catch(err) {
        log('❌ ' + err.message);
        setErrorUI('Error — di "Oye Clara" para reintentar');
        isSpeaking = false;
        setTimeout(() => {
          setIdle();
          try { wakeRecog.start(); } catch(e){}
        }, 2000);
      }
    }

    function estimateSpeakDuration(text) {
      // ~130 palabras por minuto en español → ~460ms por palabra
      const words = (text || '').split(/\s+/).length;
      return Math.max(2000, words * 460);
    }

    function endListening() {
      isListening = false;
      setIdle();
      setTimeout(() => { try { wakeRecog.start(); } catch(e){} }, 300);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      try {
        await startLiveAvatarSession();
        startWakeWord();
      } catch(err) {
        log('❌ ' + err.message);
        loadText.textContent = '❌ ' + err.message;
        retryBtn.style.display = 'block';
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
